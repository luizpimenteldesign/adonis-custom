<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Enviado — Adonis Custom</title>
    <link rel="icon" type="image/png" href="/public/assets/img/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/public/assets/img/favicon.png">
    <link rel="apple-touch-icon" href="/public/assets/img/favicon.png">
    <link rel="stylesheet" href="/public/assets/css/style.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <a href="/" class="logo">
            <img src="/public/assets/img/Logo-Adonis3.png" alt="Adonis Custom Luthieria">
        </a>
    </div>
</header>

<main class="sucesso-page">
    <div class="container">
        <div class="sucesso-card">
            <div class="sucesso-icon">
                <span class="material-symbols-outlined">check_circle</span>
            </div>
            <h1 class="sucesso-titulo">Pedido Enviado!</h1>
            <p class="sucesso-subtitulo">Recebemos seu pedido de orçamento.</p>

            <div class="sucesso-info" id="sucesso-info">
                <div class="sucesso-linha">
                    <span class="sucesso-label">Número do Pedido</span>
                    <span class="sucesso-valor" id="pedido-numero">—</span>
                </div>
                <div class="sucesso-linha">
                    <span class="sucesso-label">Instrumento</span>
                    <span class="sucesso-valor" id="pedido-instrumento">—</span>
                </div>
            </div>

            <p class="sucesso-aviso">
                Em breve entraremos em contato pelo WhatsApp com o orçamento.
            </p>

            <div class="sucesso-acoes">
                <a href="/" class="btn btn-secondary">Voltar ao site</a>
                <a href="/orcamento" class="btn btn-primary">Novo pedido</a>
            </div>
        </div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const token      = params.get('token')      || '';
    const pedidoId   = params.get('pedido')     || '';
    const instrumento = params.get('instrumento') || '';

    console.log('Token recebido:', token);
    console.log('Pedido ID recebido:', pedidoId);
    console.log('Instrumento recebido:', instrumento);

    if (pedidoId)   document.getElementById('pedido-numero').textContent     = '#' + pedidoId;
    if (instrumento) document.getElementById('pedido-instrumento').textContent = instrumento;
</script>

</body>
</html>
